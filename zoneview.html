<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zone Lane Finder - Shadowfax</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body{
    background:
        radial-gradient(circle at top left,#14532d,#020617 40%),
        radial-gradient(circle at bottom right,#052e16,#000814 50%);
    min-height:100vh;
    color:white;
    overflow-x:hidden;
}

.glow{
    position:fixed; width:500px; height:500px;
    background:#22c55e; filter:blur(180px); opacity:.12;
    border-radius:50%; z-index:-1;
}
.glow1{ top:-150px; left:-150px; }
.glow2{ bottom:-150px; right:-150px; }

.container{ max-width:800px; margin:auto; padding:28px 16px; }

.header{ text-align:center; margin-bottom:22px; }
.brand{ color:#22c55e; font-size:24px; font-weight:800; letter-spacing:3px; text-shadow:0 0 20px rgba(34,197,94,.6); margin-bottom:8px; }
.zone-badge{
    display:inline-block;
    background:rgba(34,197,94,.15); border:2px solid rgba(34,197,94,.5);
    color:#22c55e; font-size:26px; font-weight:800;
    padding:10px 32px; border-radius:999px; letter-spacing:2px;
}

.stats-row{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:18px 0; }
.stat-card{
    background:rgba(15,23,42,.82); border:1px solid rgba(34,197,94,.2);
    border-radius:20px; padding:20px; text-align:center; backdrop-filter:blur(14px);
}
.stat-number{ color:#22c55e; font-size:40px; font-weight:800; }
.stat-label{ color:#94a3b8; font-size:13px; margin-top:4px; }

.section{
    background:rgba(15,23,42,.78); border:1px solid rgba(34,197,94,.18);
    border-radius:20px; padding:22px; margin-bottom:18px; backdrop-filter:blur(14px);
}
.section-title{ color:#22c55e; font-size:15px; font-weight:700; margin-bottom:14px; }

.search-row{ display:flex; gap:10px; }
.search-input{
    flex:1; padding:14px 18px; border-radius:14px;
    background:#0f172a; border:1px solid #1e293b; color:white;
    font-size:15px; outline:none;
}
.search-input::placeholder{ color:#475569; }
.search-input:focus{ border-color:rgba(34,197,94,.5); }
.search-btn{
    background:linear-gradient(135deg,#22c55e,#16a34a);
    border:none; color:white; padding:14px 22px;
    border-radius:14px; font-size:15px; font-weight:700; cursor:pointer;
}

.result-box{ margin-top:14px; }

.hub-result{
    background:rgba(34,197,94,.08); border:1px solid rgba(34,197,94,.25);
    border-radius:14px; padding:16px 20px; margin-bottom:10px;
}
.res-label{ color:#94a3b8; font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
.res-value{ color:#f1f5f9; font-size:16px; font-weight:700; margin-bottom:8px; }
.res-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
.ptl-chip{
    display:inline-block;
    background:rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.4);
    color:#22c55e; padding:5px 14px; border-radius:999px;
    font-size:13px; font-weight:700;
}
.bin-chip{
    display:inline-block;
    background:rgba(59,130,246,.12); border:1px solid rgba(59,130,246,.3);
    color:#93c5fd; padding:5px 14px; border-radius:999px;
    font-size:13px; font-weight:700;
}
.lane-chip{
    display:inline-block;
    background:rgba(168,85,247,.1); border:1px solid rgba(168,85,247,.3);
    color:#c084fc; padding:5px 14px; border-radius:999px;
    font-size:13px; font-weight:600;
}

.no-result{ color:#ef4444; font-size:15px; padding:8px 0; font-weight:600; }

.ptl-grid{ display:flex; flex-wrap:wrap; gap:10px; }
.ptl-btn{
    background:rgba(15,23,42,.9); border:1.5px solid rgba(34,197,94,.3);
    color:#22c55e; padding:10px 22px; border-radius:999px;
    font-size:14px; font-weight:700; cursor:pointer; transition:all .2s;
}
.ptl-btn:hover,.ptl-btn.active{
    background:rgba(34,197,94,.2); border-color:#22c55e;
}

.bin-section{ margin-top:18px; }
.ptl-heading{
    color:#22c55e; font-weight:700; font-size:15px;
    margin-bottom:12px; padding-bottom:10px;
    border-bottom:1px solid rgba(34,197,94,.15);
}
.bin-table-wrap{ overflow-x:auto; }
table{ width:100%; border-collapse:collapse; }
thead th{
    background:rgba(34,197,94,.12); color:#22c55e;
    font-size:12px; font-weight:700; padding:12px 14px;
    text-align:left; letter-spacing:.5px; text-transform:uppercase;
}
thead th:first-child{ border-radius:10px 0 0 10px; }
thead th:last-child{ border-radius:0 10px 10px 0; }
tbody tr{ border-bottom:1px solid rgba(255,255,255,.04); }
tbody tr:hover{ background:rgba(34,197,94,.05); }
tbody td{ padding:11px 14px; color:#e2e8f0; font-size:14px; }
.td-hub{ font-weight:600; color:#f1f5f9; }
.td-bin{
    display:inline-block;
    background:rgba(59,130,246,.12); border:1px solid rgba(59,130,246,.25);
    color:#93c5fd; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700;
}
.td-lane{ color:#94a3b8; font-size:13px; }

.loading{ text-align:center; color:#22c55e; font-size:16px; padding:24px; }
.footer{ text-align:center; margin-top:32px; color:#64748b; font-size:12px; }

@media(max-width:500px){
    .brand{ font-size:18px; }
    .zone-badge{ font-size:20px; padding:8px 20px; }
    .stat-number{ font-size:32px; }
    .search-row{ flex-direction:column; }
}

</style>
</head>
<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">

    <div class="header">
        <div class="brand">SHADOWFAX • THINK AHEAD</div>
        <div id="zoneBadge" class="zone-badge">Loading...</div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-number" id="hubCount">-</div>
            <div class="stat-label">Total Hubs</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="ptlCount">-</div>
            <div class="stat-label">Total PTLs</div>
        </div>
    </div>

    <!-- HUB SEARCH -->
    <div class="section">
        <div class="section-title">🔍 Hub Search — Kaun se PTL & Bin pe hai?</div>
        <div class="search-row">
            <input type="text" id="hubInput" class="search-input"
                placeholder="Hub ya destination name daalo..." list="hubSuggestions">
            <datalist id="hubSuggestions"></datalist>
            <button class="search-btn" onclick="searchHub()">Search</button>
        </div>
        <div class="result-box" id="hubResult"></div>
    </div>

    <!-- PTL SELECT -->
    <div class="section">
        <div class="section-title">📦 PTL Select — Us PTL ke saare Hubs & Bins</div>
        <div class="ptl-grid" id="ptlGrid">
            <div class="loading">Loading...</div>
        </div>
        <div class="bin-section" id="binSection"></div>
    </div>

    <div class="footer">Powered By Shadowfax Think Ahead</div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS75lvLukKhjtSQd0gtUGThN5Iq1Zj07hE6nUJQpHYgsFA8Mo4cu9IGnsl-1RIAxuQ7oSmsC2sYzO-c/pub?gid=0&single=true&output=csv";

let zoneData = [];

function parseCSV(text){
    const rows = [];
    const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
    for(const line of lines){
        if(!line.trim()) continue;
        const cols=[]; let cur="", inQ=false;
        for(let i=0;i<line.length;i++){
            const c=line[i];
            if(c==='"'){ if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
            else if(c===','&&!inQ){ cols.push(cur.trim()); cur=""; }
            else cur+=c;
        }
        cols.push(cur.trim());
        rows.push(cols);
    }
    return rows;
}

function getZone(){
    return (new URLSearchParams(window.location.search).get("zone")||"").trim();
}

async function init(){
    const zone = getZone();
    if(!zone){
        document.getElementById("zoneBadge").textContent="No Zone";
        document.getElementById("ptlGrid").innerHTML='<span style="color:#ef4444">Invalid QR.</span>';
        return;
    }
    document.getElementById("zoneBadge").textContent = zone;
    document.title = zone+" - Lane Finder";

    try{
        const res  = await fetch(SHEET_URL);
        const csv  = await res.text();
        const rows = parseCSV(csv);
        if(rows.length<2){ showErr("Sheet data not found."); return; }

        const h = rows[0].map(x=>x.toLowerCase());

        // Column detection — match sheet headers: Destination Name, PTL Number, Zone, Lane, PTL Bin
        const destCol = h.findIndex(x=>x.includes("destination")||x.includes("dest name")||x.includes("hub"));
        const ptlCol  = h.findIndex(x=>x.includes("ptl")&&x.includes("number"));
        const zoneCol = h.findIndex(x=>x==="zone"||x.includes("zone"));
        const laneCol = h.findIndex(x=>x==="lane"||x.includes("lane"));
        const binCol  = h.findIndex(x=>x.includes("ptl bin")||x.includes("bin"));

        zoneData = rows.slice(1)
            .map(r=>({
                hub:  (r[destCol]||"").trim(),
                ptl:  (r[ptlCol] ||"").trim(),
                zone: (r[zoneCol]||"").trim(),
                lane: (r[laneCol]||"").trim(),
                bin:  (r[binCol] ||"").trim()
            }))
            .filter(d=> d.zone.toLowerCase()===zone.toLowerCase() && d.hub!=="");

        const uniquePTLs = [...new Set(zoneData.map(d=>d.ptl).filter(Boolean))];

        document.getElementById("hubCount").textContent = zoneData.length;
        document.getElementById("ptlCount").textContent = uniquePTLs.length;

        // Hub autocomplete
        const dl = document.getElementById("hubSuggestions");
        [...new Set(zoneData.map(d=>d.hub))].forEach(hub=>{
            const o=document.createElement("option"); o.value=hub; dl.appendChild(o);
        });

        // PTL buttons
        const grid = document.getElementById("ptlGrid");
        grid.innerHTML="";
        uniquePTLs.forEach(ptl=>{
            const btn=document.createElement("button");
            btn.className="ptl-btn";
            const cnt=zoneData.filter(d=>d.ptl===ptl).length;
            btn.innerHTML=`${ptl} <span style="opacity:.6;font-size:12px">(${cnt})</span>`;
            btn.onclick=()=>showBins(ptl,btn);
            grid.appendChild(btn);
        });

    }catch(e){
        showErr("Data load failed.");
    }
}

function searchHub(){
    const q   = document.getElementById("hubInput").value.trim().toLowerCase();
    const box = document.getElementById("hubResult");
    if(!q){ box.innerHTML='<div class="no-result">Hub naam daalo.</div>'; return; }

    const matches = zoneData.filter(d=>d.hub.toLowerCase().includes(q));
    if(!matches.length){ box.innerHTML='<div class="no-result">Koi hub nahi mila.</div>'; return; }

    box.innerHTML = matches.map(d=>`
        <div class="hub-result">
            <div class="res-label">Hub / Destination</div>
            <div class="res-value">${d.hub}</div>
            <div class="res-row">
                <span class="ptl-chip">PTL: ${d.ptl||"-"}</span>
                <span class="bin-chip">Bin: ${d.bin||"-"}</span>
                <span class="lane-chip">Lane: ${d.lane||"-"}</span>
            </div>
        </div>
    `).join("");
}

function showBins(ptl, btn){
    document.querySelectorAll(".ptl-btn").forEach(b=>b.classList.remove("active"));
    if(btn) btn.classList.add("active");

    const items = zoneData.filter(d=>d.ptl===ptl);
    const sec   = document.getElementById("binSection");
    if(!items.length){ sec.innerHTML='<div class="no-result">Koi data nahi.</div>'; return; }

    let rows="";
    items.forEach((d,i)=>{
        rows+=`
        <tr>
            <td>${i+1}</td>
            <td class="td-hub">${d.hub||"-"}</td>
            <td><span class="td-bin">${d.bin||"-"}</span></td>
            <td class="td-lane">${d.lane||"-"}</td>
        </tr>`;
    });

    sec.innerHTML=`
        <div class="ptl-heading">PTL: ${ptl} &nbsp;|&nbsp; ${items.length} Hubs</div>
        <div class="bin-table-wrap">
        <table>
            <thead><tr><th>#</th><th>Hub / Destination</th><th>Bin</th><th>Lane</th></tr></thead>
            <tbody>${rows}</tbody>
        </table></div>`;
}

function showErr(msg){
    document.getElementById("ptlGrid").innerHTML=`<span style="color:#ef4444">${msg}</span>`;
}

document.addEventListener("DOMContentLoaded",()=>{
    document.getElementById("hubInput").addEventListener("keyup",e=>{
        if(e.key==="Enter") searchHub();
    });
});

init();

</script>
</body>
</html>
