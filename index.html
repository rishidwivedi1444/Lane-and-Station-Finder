<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Shadowfax Lane Finder</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    radial-gradient(circle at top left,#0f3d2e,#020617 40%),
    radial-gradient(circle at bottom right,#052e16,#000814 50%);
    min-height:100vh;
    overflow-x:hidden;
    color:white;
}

/* BACKGROUND GLOW */

.bg-glow{
    position:fixed;
    width:500px;
    height:500px;
    background:#22c55e;
    filter:blur(180px);
    opacity:.12;
    border-radius:50%;
    z-index:-1;
}

.glow1{
    top:-120px;
    left:-120px;
}

.glow2{
    bottom:-120px;
    right:-120px;
}

/* CONTAINER */

.container{
    max-width:1200px;
    margin:auto;
    padding:30px 20px;
}

/* HEADER */

.header{
    text-align:center;
    margin-bottom:35px;
}

.logo{
    font-size:20px;
    color:#22c55e;
    font-weight:600;
    letter-spacing:1px;
    margin-bottom:10px;
}

.header h1{
    font-size:54px;
    font-weight:700;
    color:#22c55e;
    text-shadow:0 0 20px rgba(34,197,94,.5);
}

.header p{
    color:#cbd5e1;
    font-size:17px;
    margin-top:10px;
}

/* STATS */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    background:rgba(15,23,42,.65);
    border:1px solid rgba(34,197,94,.2);
    backdrop-filter:blur(12px);
    border-radius:22px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.stat-card h2{
    font-size:34px;
    color:#22c55e;
    margin-bottom:8px;
}

.stat-card span{
    color:#cbd5e1;
    font-size:15px;
}

/* SEARCH */

.search-wrapper{
    background:rgba(15,23,42,.72);
    border:1px solid rgba(34,197,94,.2);
    border-radius:28px;
    padding:25px;
    backdrop-filter:blur(12px);
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    margin-bottom:30px;
}

.search-box{
    display:flex;
    gap:15px;
}

.search-box input{
    flex:1;
    padding:18px 20px;
    border:none;
    border-radius:18px;
    background:#111827;
    color:white;
    font-size:17px;
    outline:none;
    border:1px solid #1f2937;
    transition:.3s;
}

.search-box input:focus{
    border:1px solid #22c55e;
    box-shadow:0 0 18px rgba(34,197,94,.35);
}

.search-box button{
    background:linear-gradient(135deg,#22c55e,#16a34a);
    border:none;
    color:white;
    padding:18px 35px;
    border-radius:18px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 0 20px rgba(34,197,94,.35);
}

.search-box button:hover{
    transform:translateY(-2px) scale(1.03);
}

/* RESULT */

.results-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.card{
    background:rgba(15,23,42,.78);
    border:1px solid rgba(34,197,94,.18);
    border-radius:24px;
    padding:28px;
    backdrop-filter:blur(14px);
    box-shadow:0 15px 40px rgba(0,0,0,.35);
    transition:.3s;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    width:160px;
    height:160px;
    background:#22c55e;
    filter:blur(80px);
    opacity:.10;
    top:-60px;
    right:-60px;
}

.card:hover{
    transform:translateY(-5px);
    border:1px solid rgba(34,197,94,.45);
}

.card h3{
    color:#22c55e;
    font-size:28px;
    margin-bottom:22px;
}

.row{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-bottom:16px;
    border-bottom:1px solid rgba(255,255,255,.06);
    padding-bottom:10px;
}

.label{
    color:#22c55e;
    font-weight:600;
}

.value{
    color:#e2e8f0;
    text-align:right;
    word-break:break-word;
}

.no-data{
    background:rgba(15,23,42,.7);
    border:1px solid rgba(239,68,68,.25);
    padding:25px;
    border-radius:20px;
    text-align:center;
    color:#ef4444;
    font-size:18px;
    font-weight:600;
}

.loading{
    text-align:center;
    color:#22c55e;
    font-size:18px;
    margin-top:20px;
}

/* FOOTER */

.footer{
    margin-top:40px;
    text-align:center;
    color:#64748b;
    font-size:14px;
}

/* MOBILE */

@media(max-width:768px){

    .header h1{
        font-size:38px;
    }

    .search-box{
        flex-direction:column;
    }

    .search-box button{
        width:100%;
    }

    .card{
        padding:22px;
    }

    .row{
        flex-direction:column;
    }

    .value{
        text-align:left;
    }
}

</style>
</head>

<body>

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <div class="logo">
            SHADOWFAX • THINK AHEAD
        </div>

        <h1>Lane Finder Dashboard</h1>

        <p>
            Smart Warehouse Route & Station Search System
        </p>

    </div>

    <!-- STATS -->

    <div class="stats">

        <div class="stat-card">
            <h2 id="totalRecords">0</h2>
            <span>Total Hubs</span>
        </div>

        <div class="stat-card">
            <h2>LIVE</h2>
            <span>Google Sheet Connected</span>
        </div>

        <div class="stat-card">
            <h2>24×7</h2>
            <span>Realtime Search Access</span>
        </div>

    </div>

    <!-- SEARCH -->

    <div class="search-wrapper">

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Search Hub Name..."
            />

            <button onclick="searchHub()">
                Search
            </button>

        </div>

    </div>

    <!-- RESULTS -->

    <div id="results" class="results-grid"></div>

    <!-- FOOTER -->

    <div class="footer">
        Powered By Shadowfax Think Ahead
    </div>

</div>

<script>

// GOOGLE SHEET CSV URL
const SHEET_CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTDokv4RdYjDrCMxbSrzWp-8nY157pPaZBemklThhklJ7APuYtOsuyYTpSwZIfiviTspZubCSheE8h8/pub?output=csv";

let sheetData = [];

// LOAD DATA

async function loadData(){

    try{

        document.getElementById("results").innerHTML =
        `<div class="loading">Loading Live Data...</div>`;

        const response = await fetch(SHEET_CSV_URL);

        const csv = await response.text();

        const rows = csv
        .trim()
        .split("\n")
        .map(r => r.replace(/\r/g,"").split(","));

        const headers = rows[0].map(h => h.trim());

        sheetData = rows.slice(1).map(row => {

            let obj = {};

            headers.forEach((header,index)=>{

                obj[header] = row[index] || "";

            });

            return obj;

        });

        document.getElementById("totalRecords").innerText =
        sheetData.length;

        document.getElementById("results").innerHTML = "";

    }catch(error){

        console.log(error);

        document.getElementById("results").innerHTML =
        `<div class="no-data">Failed To Load Google Sheet Data</div>`;
    }
}

// SEARCH HUB

async function searchHub(){

    if(sheetData.length === 0){

        await loadData();
    }

    const hub = document
    .getElementById("searchInput")
    .value
    .trim()
    .toLowerCase();

    const resultDiv = document.getElementById("results");

    if(hub === ""){

        resultDiv.innerHTML =
        `<div class="no-data">Please Enter Hub Name</div>`;

        return;
    }

    const matches = sheetData.filter(item =>

        (item["Hub"] || "")
        .toLowerCase()
        .includes(hub)
    );

    if(matches.length === 0){

        resultDiv.innerHTML =
        `<div class="no-data">No Hub Found</div>`;

        return;
    }

    let html = "";

    matches.forEach(item => {

        html += `

        <div class="card">

            <h3>${item["Hub"] || "-"}</h3>

            <div class="row">
                <div class="label">Next Location</div>
                <div class="value">
                    ${item["Next location"] || "-"}
                </div>
            </div>

            <div class="row">
                <div class="label">PTL Bin</div>
                <div class="value">
                    ${item["PTL Bin"] || "-"}
                </div>
            </div>

            <div class="row">
                <div class="label">PTL Number</div>
                <div class="value">
                    ${item["PTL Number"] || "-"}
                </div>
            </div>

            <div class="row">
                <div class="label">SSC Zone</div>
                <div class="value">
                    ${item["SSC Zone"] || "-"}
                </div>
            </div>

            <div class="row">
                <div class="label">Global Zone</div>
                <div class="value">
                    ${item["Global Zone"] || "-"}
                </div>
            </div>

            <div class="row">
                <div class="label">Map DC</div>
                <div class="value">
                    ${item["Map DC"] || "-"}
                </div>
            </div>

        </div>

        `;
    });

    resultDiv.innerHTML = html;
}

// ENTER SEARCH

document
.getElementById("searchInput")
.addEventListener("keyup",function(event){

    if(event.key === "Enter"){

        searchHub();
    }
});

// LOAD DATA ON START

loadData();

</script>

</body>
</html>
