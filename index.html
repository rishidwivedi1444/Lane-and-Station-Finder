```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shadowfax Think Ahead - Lane Finder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    radial-gradient(circle at top left,#14532d,#020617 40%),
    radial-gradient(circle at bottom right,#052e16,#000814 50%);
    min-height:100vh;
    color:white;
    overflow-x:hidden;
}

.glow{
    position:fixed;
    width:500px;
    height:500px;
    background:#22c55e;
    filter:blur(180px);
    opacity:.12;
    border-radius:50%;
    z-index:-1;
}

.glow1{
    top:-150px;
    left:-150px;
}

.glow2{
    bottom:-150px;
    right:-150px;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:30px 20px;
}

/* HEADER */

.header{
    text-align:center;
    margin-bottom:35px;
}

.brand{
    color:#22c55e;
    font-size:44px;
    font-weight:800;
    letter-spacing:4px;
    text-shadow:0 0 25px rgba(34,197,94,.6);
    margin-bottom:16px;
}

.sub-title{
    font-size:30px;
    color:#e2e8f0;
    margin-bottom:10px;
    font-weight:600;
}

.header p{
    color:#cbd5e1;
    font-size:17px;
}

/* TOP CARDS */

.top-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:22px;
    margin-bottom:35px;
}

.top-card{
    background:rgba(15,23,42,.78);
    border:1px solid rgba(34,197,94,.18);
    border-radius:24px;
    padding:28px;
    backdrop-filter:blur(14px);
    box-shadow:0 12px 35px rgba(0,0,0,.35);
    transition:.3s;
}

.top-card:hover{
    transform:translateY(-4px);
    border:1px solid rgba(34,197,94,.45);
}

.top-card h2{
    color:#22c55e;
    font-size:42px;
    margin-bottom:8px;
}

.top-card span{
    color:#cbd5e1;
    font-size:16px;
}

/* SEARCH */

.search-wrapper{
    background:rgba(15,23,42,.75);
    border:1px solid rgba(34,197,94,.18);
    border-radius:28px;
    padding:25px;
    margin-bottom:35px;
    backdrop-filter:blur(14px);
    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.search-box{
    display:flex;
    gap:15px;
}

.search-box input{
    flex:1;
    padding:20px;
    border:none;
    border-radius:18px;
    background:#111827;
    color:white;
    font-size:17px;
    outline:none;
    border:1px solid #1f2937;
    transition:.3s;
}

.search-box input:focus{
    border:1px solid #22c55e;
    box-shadow:0 0 20px rgba(34,197,94,.4);
}

.search-box button{
    background:linear-gradient(135deg,#22c55e,#16a34a);
    border:none;
    color:white;
    padding:20px 35px;
    border-radius:18px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 0 18px rgba(34,197,94,.35);
}

.search-box button:hover{
    transform:translateY(-2px) scale(1.03);
}

/* RESULT */

.results{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:22px;
}

.info-card{
    background:rgba(15,23,42,.82);
    border:1px solid rgba(34,197,94,.18);
    border-radius:24px;
    padding:24px;
    backdrop-filter:blur(14px);
    box-shadow:0 12px 35px rgba(0,0,0,.35);
    transition:.3s;
}

.info-card:hover{
    transform:translateY(-4px);
    border:1px solid rgba(34,197,94,.45);
}

.info-title{
    color:#22c55e;
    font-size:16px;
    margin-bottom:14px;
    font-weight:600;
}

.info-value{
    color:#e2e8f0;
    font-size:22px;
    font-weight:700;
    word-break:break-word;
}

/* LOADING */

.loading{
    text-align:center;
    color:#22c55e;
    font-size:20px;
    margin-top:20px;
}

/* NO DATA */

.no-data{
    background:rgba(15,23,42,.75);
    border:1px solid rgba(239,68,68,.25);
    padding:25px;
    border-radius:20px;
    text-align:center;
    color:#ef4444;
    font-size:18px;
    font-weight:600;
}

/* FOOTER */

.footer{
    text-align:center;
    margin-top:45px;
    color:#64748b;
    font-size:14px;
}

/* MOBILE */

@media(max-width:768px){

    .brand{
        font-size:28px;
    }

    .sub-title{
        font-size:22px;
    }

    .search-box{
        flex-direction:column;
    }

    .search-box button{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <div class="brand">
            SHADOWFAX • THINK AHEAD
        </div>

        <h2 class="sub-title">
            Lane Finder Dashboard
        </h2>

        <p>
            Smart Warehouse Route & Station Search System
        </p>

    </div>

    <!-- TOP CARDS -->

    <div class="top-cards">

        <!-- SSC ZONE -->

        <div class="top-card">

            <h2 id="sscCount">0</h2>

            <span style="display:block;margin-bottom:16px;">
                SSC Zone Count
            </span>

            <div id="sscBadges"
            style="
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            margin-top:10px;
            ">
            </div>

        </div>

        <!-- TOTAL HUB -->

        <div class="top-card">

            <h2 id="totalRecords">0</h2>

            <span>
                Total Hubs
            </span>

        </div>

    </div>

    <!-- SEARCH -->

    <div class="search-wrapper">

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Search Hub Name..."
                list="hubSuggestions"
            >

            <datalist id="hubSuggestions"></datalist>

            <button onclick="searchHub()">
                Search
            </button>

        </div>

    </div>

    <!-- RESULTS -->

    <div id="results" class="results"></div>

    <!-- FOOTER -->

    <div class="footer">
        Powered By Shadowfax Think Ahead
    </div>

</div>

<script>

// GOOGLE SHEET CSV URL

const SHEET_CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTDokv4RdYjDrCMxbSrzWp-8nY157pPaZBemklThhklJ7APuYtOsuyYTpSwZIfiviTspZubCSheE8h8/pub?output=csv";

let sheetData = [];

// LOAD DATA

async function loadData(){

    try{

        document.getElementById("results").innerHTML =
        `<div class="loading">Loading Live Data...</div>`;

        const response = await fetch(SHEET_CSV_URL);

        const csv = await response.text();

        const rows = csv
        .trim()
        .split("\n")
        .map(r => r.replace(/\r/g,"").split(","));

        const headers = rows[0].map(h => h.trim());

        sheetData = rows.slice(1).map(row => {

            let obj = {};

            headers.forEach((header,index)=>{

                obj[header] = row[index] || "";

            });

            return obj;

        });

        // TOTAL HUB

        document.getElementById("totalRecords").innerText =
        sheetData.length;

        // SSC ZONE COUNTS

        const zoneCounts = {};

        sheetData.forEach(item => {

            const zone = item["SSC Zone"] || "Unknown";

            if(!zoneCounts[zone]){

                zoneCounts[zone] = 0;
            }

            zoneCounts[zone]++;

        });

        // TOTAL SSC ZONES

        document.getElementById("sscCount").innerText =
        Object.keys(zoneCounts).length;

        // SSC BADGES

        const badgeContainer =
        document.getElementById("sscBadges");

        badgeContainer.innerHTML = "";

        Object.entries(zoneCounts).forEach(([zone,count]) => {

            badgeContainer.innerHTML += `

            <div style="
                padding:8px 14px;
                border-radius:999px;
                background:rgba(34,197,94,.15);
                border:1px solid rgba(34,197,94,.35);
                color:#22c55e;
                font-size:13px;
                font-weight:700;
                display:flex;
                align-items:center;
                gap:6px;
            ">

                ${zone}

                <span style="
                    background:#22c55e;
                    color:#04130a;
                    padding:2px 8px;
                    border-radius:999px;
                    font-size:12px;
                    font-weight:800;
                ">
                    ${count}
                </span>

            </div>

            `;
        });

        // HUB DROPDOWN

        const datalist =
        document.getElementById("hubSuggestions");

        datalist.innerHTML = "";

        sheetData.forEach(item => {

            const option =
            document.createElement("option");

            option.value = item["Hub"];

            datalist.appendChild(option);

        });

        document.getElementById("results").innerHTML = "";

    }catch(error){

        console.log(error);

        document.getElementById("results").innerHTML =
        `<div class="no-data">Failed To Load Google Sheet Data</div>`;
    }
}

// SEARCH FUNCTION

async function searchHub(){

    if(sheetData.length === 0){

        await loadData();
    }

    const hub = document
    .getElementById("searchInput")
    .value
    .trim()
    .toLowerCase();

    const resultDiv =
    document.getElementById("results");

    if(hub === ""){

        resultDiv.innerHTML =
        `<div class="no-data">Please Enter Hub Name</div>`;

        return;
    }

    const matches = sheetData.filter(item =>

        (item["Hub"] || "")
        .toLowerCase()
        .includes(hub)
    );

    if(matches.length === 0){

        resultDiv.innerHTML =
        `<div class="no-data">No Hub Found</div>`;

        return;
    }

    let html = "";

    matches.forEach(item => {

        const nextLocationKey =
        Object.keys(item).find(k =>
            k.toLowerCase().includes("next")
        );

        html += `

        <div class="info-card">
            <div class="info-title">Hub</div>
            <div class="info-value">
                ${item["Hub"] || "-"}
            </div>
        </div>

        <div class="info-card">
            <div class="info-title">Next Location</div>
            <div class="info-value">
                ${
                    nextLocationKey
                    ?
                    item[nextLocationKey]
                    :
                    "-"
                }
            </div>
        </div>

        <div class="info-card">
            <div class="info-title">PTL Bin</div>
            <div class="info-value">
                ${item["PTL Bin"] || "-"}
            </div>
        </div>

        <div class="info-card">
            <div class="info-title">PTL Number</div>
            <div class="info-value">
                ${item["PTL Number"] || "-"}
            </div>
        </div>

        <div class="info-card">
            <div class="info-title">SSC Zone</div>
            <div class="info-value">
                ${item["SSC Zone"] || "-"}
            </div>
        </div>

        <div class="info-card">
            <div class="info-title">Global Zone</div>
            <div class="info-value">
                ${item["Global Zone"] || "-"}
            </div>
        </div>

        <div class="info-card">
            <div class="info-title">Map DC</div>
            <div class="info-value">
                ${item["Map DC"] || "-"}
            </div>
        </div>

        `;
    });

    resultDiv.innerHTML = html;
}

// ENTER KEY SEARCH

document
.getElementById("searchInput")
.addEventListener("keyup",function(event){

    if(event.key === "Enter"){

        searchHub();
    }
});

// AUTO LOAD

loadData();

</script>

</body>
</html>
```
