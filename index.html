<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Lane Finder Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    padding:20px;
    color:white;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:38px;
    color:#22c55e;
    margin-bottom:10px;
}

.header p{
    color:#cbd5e1;
}

.search-box{
    display:flex;
    gap:12px;
    margin-bottom:25px;
}

.search-box input{
    flex:1;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    font-size:16px;
    outline:none;
    border:1px solid #334155;
}

.search-box input:focus{
    border:1px solid #22c55e;
    box-shadow:0 0 12px rgba(34,197,94,.5);
}

.search-box button{
    padding:16px 24px;
    border:none;
    border-radius:14px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

.search-box button:hover{
    background:#16a34a;
    transform:scale(1.03);
}

.card{
    background:#1e293b;
    border-radius:18px;
    padding:20px;
    margin-bottom:18px;
    border:1px solid #334155;
    box-shadow:0 4px 15px rgba(0,0,0,.3);
}

.card h3{
    color:#22c55e;
    margin-bottom:15px;
    font-size:22px;
}

.row{
    margin:10px 0;
    color:#e2e8f0;
    font-size:15px;
}

.row b{
    color:#22c55e;
}

.no-data{
    text-align:center;
    background:#1e293b;
    padding:20px;
    border-radius:14px;
    color:#ef4444;
    font-size:18px;
    font-weight:bold;
}

.loading{
    text-align:center;
    color:#22c55e;
    margin-top:20px;
    font-size:18px;
}

@media(max-width:700px){

    .search-box{
        flex-direction:column;
    }

    .search-box button{
        width:100%;
    }

    .header h1{
        font-size:28px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Lane Finder Dashboard</h1>
        <p>Search Hub Name & Get Route Details</p>
    </div>

    <div class="search-box">
        <input 
            type="text" 
            id="searchInput" 
            placeholder="Enter Hub Name..."
        />

        <button onclick="searchHub()">
            Search
        </button>
    </div>

    <div id="results"></div>

</div>

<script>

// GOOGLE SHEET CSV URL
const SHEET_CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTDokv4RdYjDrCMxbSrzWp-8nY157pPaZBemklThhklJ7APuYtOsuyYTpSwZIfiviTspZubCSheE8h8/pub?output=csv";

let sheetData = [];

// LOAD DATA
async function loadData(){

    try{

        document.getElementById("results").innerHTML =
        `<div class="loading">Loading Data...</div>`;

        const response = await fetch(SHEET_CSV_URL);

        const csv = await response.text();

        const rows = csv
        .trim()
        .split("\n")
        .map(r => r.replace(/\r/g,"").split(","));

        const headers = rows[0].map(h => h.trim());

        sheetData = rows.slice(1).map(row => {

            let obj = {};

            headers.forEach((header,index)=>{

                obj[header] = row[index] || "";

            });

            return obj;

        });

    }catch(error){

        console.log(error);

        document.getElementById("results").innerHTML =
        `<div class="no-data">Failed To Load Data</div>`;
    }
}

// SEARCH FUNCTION
async function searchHub(){

    if(sheetData.length === 0){

        await loadData();
    }

    const hub = document
    .getElementById("searchInput")
    .value
    .trim()
    .toLowerCase();

    const resultDiv = document.getElementById("results");

    if(hub === ""){

        resultDiv.innerHTML =
        `<div class="no-data">Please Enter Hub Name</div>`;

        return;
    }

    const matches = sheetData.filter(item =>

        (item["Hub"] || "")
        .toLowerCase()
        .includes(hub)
    );

    if(matches.length === 0){

        resultDiv.innerHTML =
        `<div class="no-data">No Data Found</div>`;

        return;
    }

    let html = "";

    matches.forEach(item => {

        html += `

        <div class="card">

            <h3>${item["Hub"] || "-"}</h3>

            <div class="row">
                <b>Next Location:</b>
                ${item["Next location"] || "-"}
            </div>

            <div class="row">
                <b>PTL Bin:</b>
                ${item["PTL Bin"] || "-"}
            </div>

            <div class="row">
                <b>PTL Number:</b>
                ${item["PTL Number"] || "-"}
            </div>

            <div class="row">
                <b>SSC Zone:</b>
                ${item["SSC Zone"] || "-"}
            </div>

            <div class="row">
                <b>Global Zone:</b>
                ${item["Global Zone"] || "-"}
            </div>

        </div>

        `;
    });

    resultDiv.innerHTML = html;
}

// ENTER KEY SEARCH
document
.getElementById("searchInput")
.addEventListener("keyup",function(event){

    if(event.key === "Enter"){

        searchHub();
    }
});

</script>

</body>
</html>
